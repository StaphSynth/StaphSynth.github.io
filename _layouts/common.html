<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>
      {% if page.url == "/" %}
        {{ site.title }}
      {% else %}
        {{ page.title | append: " | " | append: site.title }}
      {% endif %}
    </title>
    <script type="text/javascript" src="https://use.fontawesome.com/0523816ffe.js"></script>
    <link rel="alternate" type="application/rss+xml" title="Syntheta.se RSS" href="/feed.xml" />
    <link type="text/css" rel="stylesheet" href="/css/main.css" />
    <link type="text/css" rel="stylesheet" href="/css/syntax.css" />
    <link rel="icon" type="image/png" href="/img/favicon-32x32.png" sizes="32x32" />
    <link rel="icon" type="image/png" href="/img/favicon-16x16.png" sizes="16x16" />
    <link href="https://fonts.googleapis.com/css?family=Audiowide|Source+Code+Pro|Open+Sans:400,700,400italic,700italic" rel="stylesheet" />
    {% seo title=false %}
  </head>
  <body>
    <div id="pageWrapper">
      <header>
        <noscript>
          <div id="noscript">
            JavaScript is turned off. Please <a href="http://enable-javascript.com/" target="_blank">enable JavaScript</a> for full use of this site.
          </div>
        </noscript>

        <div id="masthead">
          <div id="heading">
            <a href="/"><h1>Synthetase's World of Nerd</h1></a>
          </div>
        </div>

        <nav class="menu main-menu">
          <button id="navIcon" type="button"><i class="fa fa-bars"></i> <i class="fa fa-caret-down" aria-hidden="true"></i></button>
          <ul>
            <li><a href="/" class="{% if page.url == '/' %}selected{% endif %}">Home</a></li>
            <li><a href="/coding/" class="{% if page.url contains '/coding/' %}selected{% endif %}">Coding</a></li>
            <li><a href="/projects/" class="{% if page.url contains '/projects/' %}selected{% endif %}">Projects</a></li>
            <li><a href="/about/"  class="{% if page.url contains '/about/' %}selected{% endif %}">About</a></li>
          </ul>
        </nav>
      </header>

      <div class="content-wrapper">
        <div class="article">
          {{ content }}
        </div>
      </div>

      <footer>
        <div id=footerContainer>
          <div id="connect">
            <p>Connect with me:</p>
            <ul>
              <li><a href="https://github.com/StaphSynth" target="_blank"><i class="fa fa-github-square social" aria-hidden="false"></i></a></li>
              <li><a href="https://www.linkedin.com/in/david-allen-102290119/" data-proofer-ignore target="_blank"><i class="fa fa-linkedin-square social" aria-hidden="false"></i></a></li>
              <li><a href="{{ site.url }}/feed.xml"><i class="fa fa-rss-square social" aria-hidden="false"></i></a></li></li>
            </ul>
          </div>
          <div id="licence">
            <ul>
              <li id="ccLogo"><a rel="license" href="https://creativecommons.org/licenses/by-sa/4.0/" target="_blank"><img src="{{ site.url }}/img/cc.png" alt="Creative commons logo"></a></li>
              <li>This site is licensed under a Creative Commons <a rel="license" href="https://creativecommons.org/licenses/by-sa/4.0/" target="_blank">Attribution-ShareAlike</a> 4.0 International Licence.</li>
            </ul>
          </div>
        </div> <!--/footerContainer -->
      </footer>

    </div> <!--/pageWrapper-->
  </body>
  <!--Loads non-render-critical JavaScript after the page has been rendered-->
  <script type="text/javascript">
    function loadScriptPostRender() {
      const urls = [
        'https://code.jquery.com/jquery-1.11.0.min.js',
        '{{ site.url }}/js/synth.js'
      ];

      urls.forEach(function(url) {
        const script = document.createElement('script');
        script.src = url;
        script.type = 'text/javascript';
        script.async = false;
        document.body.appendChild(script);
      });
    }

    if (window.addEventListener) {
      window.addEventListener('load', loadScriptPostRender, false);
    } else if (window.attachEvent) {
      window.attachEvent('onload', loadScriptPostRender);
    } else {
      window.onload = loadScriptPostRender;
    }
  </script>
</html>
